<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="430" viewBox="0 0 1100 430" role="img" aria-labelledby="title desc">
  <title id="title">goal-creator workflow</title>
  <desc id="desc">A workflow diagram showing a vague request compiled into a saved goal contract and dispatched to Codex subagents.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1100" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="140" y1="80" x2="980" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="0.52" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
  </defs>

  <rect width="1100" height="430" rx="34" fill="url(#panel)"/>
  <rect x="28" y="28" width="1044" height="374" rx="28" fill="#ffffff" stroke="#dbe3ef"/>

  <text x="70" y="82" fill="#0f172a" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="760">goal-creator</text>
  <text x="70" y="118" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Codex-native goal compiler for subagent-first execution</text>

  <g filter="url(#shadow)">
    <rect x="70" y="170" width="210" height="105" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="94" y="210" fill="#0f172a" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Vague Request</text>
    <text x="94" y="240" fill="#64748b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">“Refactor this module”</text>

    <rect x="360" y="150" width="260" height="145" rx="22" fill="url(#accent)"/>
    <text x="394" y="198" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="760">Compile</text>
    <text x="394" y="230" fill="#dbeafe" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">tiny launcher</text>
    <text x="394" y="256" fill="#dbeafe" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">strict .goals/*.md contract</text>

    <rect x="700" y="110" width="300" height="80" rx="18" fill="#f8fafc" stroke="#bfdbfe"/>
    <text x="730" y="145" fill="#1e3a8a" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="760">Main Agent</text>
    <text x="730" y="172" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">schedule • merge • verify</text>

    <rect x="700" y="224" width="300" height="112" rx="18" fill="#faf5ff" stroke="#ddd6fe"/>
    <text x="730" y="260" fill="#581c87" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="760">Subagents</text>
    <text x="730" y="288" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">file-owned slices</text>
    <text x="730" y="314" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">local tests • handoff • risks</text>
  </g>

  <path d="M290 222h50" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
  <path d="M332 212l16 10-16 10" fill="none" stroke="#64748b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M630 222c42 0 42-72 68-72" fill="none" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
  <path d="M686 142l16 6-13 13" fill="none" stroke="#64748b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M630 224c42 0 42 56 68 56" fill="none" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
  <path d="M688 267l14 13-17 7" fill="none" stroke="#64748b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <g>
    <rect x="70" y="322" width="165" height="38" rx="19" fill="#ecfeff" stroke="#99f6e4"/>
    <text x="94" y="347" fill="#115e59" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Short launcher</text>
    <rect x="250" y="322" width="165" height="38" rx="19" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="274" y="347" fill="#1d4ed8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Deep contract</text>
    <rect x="430" y="322" width="205" height="38" rx="19" fill="#f5f3ff" stroke="#ddd6fe"/>
    <text x="454" y="347" fill="#6d28d9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Subagent-first</text>
  </g>
</svg>
